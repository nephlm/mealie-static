<!DOCTYPE html>
<html lang="en">
<head>
    <title>My ShoppingList</title>
</head>
<body>
    <ul id="navigation">
    
    <h3>Frozen Foods</h3>
        <ul style="list-style-type:none;">
            
            <li>
                <input type="checkbox" id="1 onion">
                1 onion
            </li>
            
        </ul>
    
    <h3>Cans and Jars</h3>
        <ul style="list-style-type:none;">
            
            <li>
                <input type="checkbox" id="2 cans tomato  14.5 oz ea">
                2 cans tomato  14.5 oz ea
            </li>
            
        </ul>
    
    <h3>Spices</h3>
        <ul style="list-style-type:none;">
            
            <li>
                <input type="checkbox" id="¹/₂ tsp pepper">
                ¹/₂ tsp pepper
            </li>
            
        </ul>
    
    <h3>Meat</h3>
        <ul style="list-style-type:none;">
            
            <li>
                <input type="checkbox" id="1 lb ground beef">
                1 lb ground beef
            </li>
            
        </ul>
    
    </ul>

</body>
</html>
